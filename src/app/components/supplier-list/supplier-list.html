<div class="supplier-list-container">
  <div class="header-section">
    <h2>Suppliers</h2>
    <button mat-raised-button color="primary" (click)="openAddDialog()">
      <span class="emoji-icon">➕</span>
      Add Supplier
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-container">
    <mat-spinner diameter="50"></mat-spinner>
    <p>Loading suppliers...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="errorMessage && !isLoading" class="error-message">
    <span class="emoji-icon">❌</span>
    <p>{{ errorMessage }}</p>
  </div>

  <!-- Suppliers Table -->
  <div *ngIf="!isLoading && suppliers.length > 0" class="table-container">
    <table mat-table [dataSource]="suppliers" class="suppliers-table">
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>
          <span class="th-content"><span class="emoji-icon">🏢</span> Supplier Name</span>
        </th>
        <td mat-cell *matCellDef="let supplier">
          <strong>{{ supplier.name }}</strong>
        </td>
      </ng-container>

      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>
          <span class="th-content"><span class="emoji-icon">📧</span> Email</span>
        </th>
        <td mat-cell *matCellDef="let supplier">
          <a [href]="'mailto:' + supplier.email" class="email-link">
            {{ supplier.email }}
          </a>
        </td>
      </ng-container>

      <!-- Phone Column -->
      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef>
          <span class="th-content"><span class="emoji-icon">📞</span> Phone</span>
        </th>
        <td mat-cell *matCellDef="let supplier">
          <a *ngIf="supplier.phone" [href]="'tel:' + supplier.phone" class="phone-link">
            {{ supplier.phone }}
          </a>
          <span *ngIf="!supplier.phone" class="no-data">—</span>
        </td>
      </ng-container>

      <!-- Address Column -->
      <ng-container matColumnDef="address">
        <th mat-header-cell *matHeaderCellDef>
          <span class="th-content"><span class="emoji-icon">📍</span> Address</span>
        </th>
        <td mat-cell *matCellDef="let supplier">
          <span class="address-text">{{ supplier.address || '—' }}</span>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let supplier">
          <button 
            mat-icon-button 
            color="primary" 
            (click)="openEditDialog(supplier)"
            matTooltip="Edit supplier"
            aria-label="Edit supplier">
            <span class="emoji-icon">✏️</span>
          </button>
          <button 
            mat-icon-button 
            color="warn" 
            (click)="deleteSupplier(supplier)"
            matTooltip="Delete supplier"
            aria-label="Delete supplier">
            <span class="emoji-icon">🗑️</span>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="supplier-row"></tr>
    </table>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && suppliers.length === 0 && !errorMessage" class="empty-state">
    <span class="emoji-icon" style="font-size:48px">📦</span>
    <h3>No suppliers found</h3>
    <p>Click "Add Supplier" to get started.</p>
    <button mat-raised-button color="primary" (click)="openAddDialog()">
      <span class="emoji-icon">➕</span>
      Add Your First Supplier
    </button>
  </div>
</div>

<mat-toolbar color="primary" class="navbar">
  <mat-toolbar-row>
    <button mat-icon-button routerLink="/dashboard">
      <mat-icon>inventory_2</mat-icon>
    </button>
    <span class="nav-brand">Inventory Management System</span>
    <span class="spacer"></span>
    <nav class="nav-menu" *ngIf="authService.isAuthenticated()">
      <button mat-button routerLink="/dashboard" routerLinkActive="active">
        <mat-icon>dashboard</mat-icon>
        Dashboard
      </button>
      <button mat-button routerLink="/products" routerLinkActive="active">
        <mat-icon>inventory</mat-icon>
        Products
      </button>
      <button mat-button routerLink="/suppliers" routerLinkActive="active">
        <mat-icon>business</mat-icon>
        Suppliers
      </button>
      <button mat-button routerLink="/orders" routerLinkActive="active">
        <mat-icon>shopping_cart</mat-icon>
        Orders
      </button>
      <button mat-button (click)="authService.logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </nav>
  </mat-toolbar-row>
</mat-toolbar>

<!-- Main Content -->
<main class="main-content">
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<footer class="footer">
  <p>&copy; 2025 Inventory Management System. All rights reserved.</p>
</footer>
